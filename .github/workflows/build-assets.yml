name: build-assets

on:
  push:
    branches: [main, master]
    paths:
      - 'resources/views/**'
      - 'resources/css/**'
      - 'tailwind.config.js'
      - 'postcss.config.js'
      - 'vite.config.js'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: build assets'
          file_pattern: 'dist/'
