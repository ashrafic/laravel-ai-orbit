<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Orbital ring 1 (horizontal tilt) -->
  <ellipse cx="32" cy="32" rx="24" ry="10" fill="none" stroke="rgba(99,102,241,0.5)" stroke-width="2" transform="rotate(-20 32 32)"/>
  <!-- Orbital ring 2 (vertical tilt) -->
  <ellipse cx="32" cy="32" rx="24" ry="10" fill="none" stroke="rgba(139,92,246,0.4)" stroke-width="2" transform="rotate(70 32 32)"/>
  <!-- Orbital ring 3 (subtle) -->
  <ellipse cx="32" cy="32" rx="20" ry="8" fill="none" stroke="rgba(99,102,241,0.25)" stroke-width="1.5" transform="rotate(25 32 32)"/>
  <!-- Core nucleus -->
  <circle cx="32" cy="32" r="6" fill="url(#coreGrad)" filter="url(#glow)"/>
  <!-- Small orbiting dot -->
  <circle cx="52" cy="22" r="2.5" fill="#818cf8" opacity="0.8"/>
</svg>
